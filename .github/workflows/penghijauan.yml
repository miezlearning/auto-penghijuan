name: Auto Commit

on:
  schedule:
    # Setiap hari jam 00:00 UTC (atur sesuai kebutuhan)
    - cron: "0 0 * * *"
  workflow_dispatch:   # Bisa dijalankan manual lewat tab Actions

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    # Izin untuk menulis ke konten repository
    permissions:
      contents: write

    steps:
      # 1. Checkout repository (dengan token bawaan)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Lakukan perubahan / generate file (contoh: update timestamp)
      - name: Make changes
        run: |
          echo "Update terakhir: $(date)" > last-update.txt

      # 3. Commit & push otomatis
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto update [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
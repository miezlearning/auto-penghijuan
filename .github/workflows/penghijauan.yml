name: Auto Commit

on:
  schedule:
    # Berjalan setiap 30 menit (bisa disesuaikan, misal "*/15 * * * *" untuk 15 menit)
    - cron: "*/30 * * * *"
  workflow_dispatch:   # Bisa dijalankan manual lewat tab Actions

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    # Izin untuk menulis ke konten repository
    permissions:
      contents: write

    steps:
      # 1. Checkout repository (dengan token bawaan)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Lakukan 10 commit unik secara berurutan dan push sekaligus
      - name: Make 10 commits and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          for i in {1..10}
          do
            # Update file dengan timestamp dan nomor urut commit
            echo "Update terakhir: $(date) - commit ke-$i" > last-update.txt
            git add last-update.txt
            git commit -m "chore: auto update part $i [skip ci]"
            # Jeda singkat agar timestamp commit berbeda
            sleep 1
          done
          
          # Push semua commit ke remote repository
          git push origin HEAD